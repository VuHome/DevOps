services:
  api:
    image: ghcr.io/vuhome/api:latest
    container_name: vuhom-api
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.vuhom.com`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=8003

networks:
  proxy:
    external: true
